version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: ./api/Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - chakravyuh-net

  honeypot:
    build:
      context: ./backend/honeypot
    networks:
      - chakravyuh-net

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "8501:8501"
    networks:
      - chakravyuh-net

networks:
  chakravyuh-net:
    driver: bridge

